# Render Blueprint — one-click deploy.
# In Render: New + → Blueprint → connect your GitHub repo.
# Render will read this file and create the service + persistent disk.
services:
  - type: web
    name: vehicle-dashboard
    runtime: node
    plan: starter            # $7/mo. Free plan also works but spins down after 15 min idle.
    region: oregon           # change to ohio / frankfurt / singapore as you like
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: dashboard-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"        # Render injects PORT but pinning is fine
      - key: DB_PATH
        value: /var/data/data.db
      - key: SYNC_INTERVAL_MINUTES
        value: "60"
      - key: AIRTABLE_BASE_ID
        value: appf7SJsAl6DzYcV7
      - key: AIRTABLE_TOTAL_CARS_TABLE_ID
        value: tbl5N50qREGA00mm1
      - key: AIRTABLE_POST_LOG_TABLE_ID
        value: tblO05lgOSbZkPWsI
      - key: AIRTABLE_TOKEN
        sync: false           # prompt me in the Render dashboard, do not commit
