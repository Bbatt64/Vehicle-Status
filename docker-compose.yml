services:
  vehicle-dashboard:
    build: .
    image: vehicle-dashboard:latest
    container_name: vehicle-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      AIRTABLE_TOKEN: ${AIRTABLE_TOKEN}
      AIRTABLE_BASE_ID: ${AIRTABLE_BASE_ID:-appf7SJsAl6DzYcV7}
      AIRTABLE_TOTAL_CARS_TABLE_ID: ${AIRTABLE_TOTAL_CARS_TABLE_ID:-tbl5N50qREGA00mm1}
      AIRTABLE_POST_LOG_TABLE_ID: ${AIRTABLE_POST_LOG_TABLE_ID:-tblO05lgOSbZkPWsI}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-60}
      DB_PATH: /data/data.db
      PORT: "5000"
    volumes:
      - dashboard-data:/data

volumes:
  dashboard-data:
